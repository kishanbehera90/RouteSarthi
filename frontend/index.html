    <title>RouteSarthi — Every journey deserves peace of mind.</title>
    <script>
      (function () {
        try {
          // Default light; only dark if the user explicitly chose it before.
          if (localStorage.getItem('routesarthi-theme') === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"

    />

      rel="stylesheet"
    />
